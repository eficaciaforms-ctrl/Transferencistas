<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B1220">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Call Transfer</title>
<style>
  :root{
    --ink:#0B1220;--surf:#131C2E;--surf2:#1B2740;--line:#27344E;
    --blue:#2563EB;--blue-soft:#3B82F6;--cyan:#22D3EE;
    --emerald:#10B981;--amber:#F59E0B;--rose:#F43F5E;--violet:#a78bfa;
    --txt:#E6EDF7;--mut:#93A3BE;--mut2:#5F718F;--r:16px;--shadow:0 18px 40px -22px rgba(0,0,0,.65);
  }
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 15% -10%,#16224080,transparent 60%),
      radial-gradient(1000px 700px at 110% 0%,#0e2a4d66,transparent 55%),var(--ink);
    color:var(--txt);-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#23314e;border-radius:20px}
  .hide{display:none!important}

  #login{min-height:100%;display:grid;place-items:center;padding:24px}
  .card-login{width:100%;max-width:400px;background:linear-gradient(180deg,var(--surf),#101a2e);border:1px solid var(--line);border-radius:22px;padding:30px;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#031022;font-weight:800;font-size:18px}
  .brand b{font-size:18px}.brand small{display:block;color:var(--mut);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600}
  .login-sub{color:var(--mut);font-size:13px;margin:14px 0 20px;line-height:1.5}
  label.fl{display:block;font-size:12px;color:var(--mut);margin:14px 0 6px}
  input.fld,select.fld,textarea.fld{width:100%;background:#0c1626;border:1px solid var(--line);color:var(--txt);padding:13px 14px;border-radius:12px;font-size:15px;outline:none}
  input.fld:focus,select.fld:focus,textarea.fld:focus{border-color:var(--blue);box-shadow:0 0 0 3px #2563eb33}
  .btn-primary{width:100%;margin-top:20px;background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;font-weight:700;font-size:15px;padding:14px;border-radius:12px;box-shadow:0 12px 26px -12px #2563ebcc}
  .btn-primary:active{transform:translateY(1px)}
  .install-btn{width:100%;margin-top:10px;background:#0c1626;border:1px solid var(--line);color:var(--cyan);font-weight:700;font-size:13.5px;padding:12px;border-radius:12px}
  .hint{margin-top:18px;background:#0c1626;border:1px dashed var(--line);border-radius:12px;padding:12px 14px;font-size:11.5px;color:var(--mut);line-height:1.7}
  .hint b{color:var(--cyan)}.err{color:var(--rose);font-size:12.5px;margin-top:12px;min-height:16px}

  .topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px;padding:12px 14px;background:#0c1424ee;backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar .logo{width:32px;height:32px;font-size:15px;border-radius:9px}
  .topbar .tt{font-weight:700;font-size:15px;line-height:1.1}
  .topbar .tt small{display:block;font-size:10px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase;font-weight:600}
  .spacer{flex:1}
  .bell{position:relative;background:var(--surf2);border:1px solid var(--line);border-radius:11px;width:38px;height:38px;font-size:17px;display:grid;place-items:center}
  .bell .bdg{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;border-radius:10px;background:var(--rose);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center;padding:0 4px}
  .userchip{display:flex;align-items:center;gap:8px;background:var(--surf2);border:1px solid var(--line);border-radius:30px;padding:5px 11px 5px 6px;font-size:12.5px}
  .avatar{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;background:linear-gradient(135deg,#334155,#475569);color:#fff}
  .logout{background:transparent;border:1px solid var(--line);border-radius:9px;padding:7px 10px;color:var(--mut);font-size:12px;font-weight:600}

  .wrap{max-width:520px;margin:0 auto;padding:16px 16px 48px}.dash-wrap{max-width:1180px}
  .greet h1{margin:0;font-size:21px;letter-spacing:-.02em}.greet p{margin:4px 0 0;color:var(--mut);font-size:13px}.greet{margin:8px 2px 16px}
  .chip-ok{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--emerald);background:#0c2118;border:1px solid #1d4d39;border-radius:20px;padding:4px 11px;font-weight:700;margin:2px 2px 0}
  .chip-ok .pulse{width:7px;height:7px;border-radius:50%;background:var(--emerald);animation:pulse 1.4s infinite}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
  .kpi{background:linear-gradient(180deg,var(--surf),#101a2e);border:1px solid var(--line);border-radius:var(--r);padding:13px 12px}
  .kpi .lab{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
  .kpi .val{font-size:20px;font-weight:800;margin-top:6px}.kpi .val small{font-size:11px;color:var(--mut);font-weight:600}
  .kpi.accent .val{color:var(--cyan)}.kpi.green .val{color:var(--emerald)}

  .hero{margin-top:16px;background:linear-gradient(135deg,#16275088,#0e1a30);border:1px solid var(--line);border-radius:20px;padding:20px;text-align:center}
  .hero .hh{font-size:13px;color:var(--mut);margin-bottom:14px}
  .start-btn{width:100%;background:linear-gradient(135deg,var(--emerald),#059669);color:#fff;font-weight:800;font-size:16px;padding:17px;border-radius:15px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 16px 30px -14px #10b981cc}
  .start-btn:active{transform:translateY(1px)}
  .testlink{display:block;text-align:center;margin-top:18px;color:var(--mut2);font-size:11.5px;text-decoration:underline;background:none}

  .sec-title{display:flex;align-items:center;justify-content:space-between;margin:24px 4px 11px}
  .sec-title h2{margin:0;font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut)}
  .sec-title .badge{font-size:11px;color:var(--cyan);background:#0c2233;border:1px solid #134a5e;border-radius:20px;padding:3px 10px;font-weight:700}

  .call{display:flex;gap:12px;align-items:center;background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px}
  .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;flex:none;font-size:17px;background:#10243b;color:var(--blue-soft)}
  .call .who{flex:1;min-width:0}.call .who b{font-size:14.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .call .who span{font-size:11.5px;color:var(--mut)}.call .who .meta{font-size:11px;color:var(--mut2);margin-top:2px}
  .call .rt{text-align:right;flex:none}.call .rt .dur{font-weight:800;font-size:15px;color:var(--cyan)}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;border-radius:20px;padding:2px 9px;margin-top:4px}
  .tag.sale{background:#0c2a1f;color:var(--emerald)}.tag.nosale{background:#2c2310;color:var(--amber)}
  .empty{text-align:center;color:var(--mut);padding:30px 16px;font-size:13.5px;border:1px dashed var(--line);border-radius:14px}

  .sheet{position:fixed;inset:0;z-index:90;background:#060c16e6;backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center}
  .sheet-inner{width:100%;max-width:520px;background:linear-gradient(180deg,#13203a,#0d1729);border:1px solid var(--line);border-bottom:none;border-radius:24px 24px 0 0;padding:22px 20px 26px;max-height:94vh;overflow:auto;animation:up .26s cubic-bezier(.2,.8,.2,1)}
  @keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet h3{margin:2px 0 3px;font-size:18px}
  .sheet .step{font-size:12px;color:var(--cyan);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  .dial-num{font-size:30px;font-weight:800;text-align:center;letter-spacing:1px;margin:18px 0 4px;min-height:38px}
  .dial-cli{text-align:center;color:var(--mut);font-size:13px;margin-bottom:4px}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
  .key{background:#0c1626;border:1px solid var(--line);border-radius:14px;padding:15px 0;font-size:22px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:1px}
  .key small{font-size:9px;color:var(--mut2);letter-spacing:2px;font-weight:600}.key:active{background:#16223c}.key.back{font-size:20px;color:var(--mut)}
  .btn-call{width:100%;background:linear-gradient(135deg,var(--emerald),#059669);color:#fff;font-weight:800;font-size:16px;padding:16px;border-radius:15px;display:flex;align-items:center;justify-content:center;gap:9px;text-decoration:none;box-shadow:0 14px 28px -14px #10b981cc}
  .btn-call[aria-disabled="true"]{opacity:.45;pointer-events:none}
  .ring-wrap{display:grid;place-items:center;margin:14px 0 8px}.ring{position:relative;width:200px;height:200px}.ring svg{transform:rotate(-90deg)}
  .ring .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .ring .time{font-size:40px;font-weight:800;line-height:1}.ring .cli{font-size:13px;color:var(--mut);margin-top:6px}
  .live-pill{display:inline-flex;align-items:center;gap:7px;background:#102a1f;color:var(--emerald);border:1px solid #1d4d39;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;margin-top:6px}
  .live-pill .pulse{width:8px;height:8px;border-radius:50%;background:var(--emerald);animation:pulse 1.3s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 #10b98199}70%{box-shadow:0 0 0 9px #10b98100}100%{box-shadow:0 0 0 0 #10b98100}}
  .btn-stop{width:100%;background:linear-gradient(135deg,var(--rose),#be123c);color:#fff;font-weight:800;padding:15px;border-radius:14px;margin-top:8px}
  .meta-line{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:8px}
  .seg button{padding:14px;border-radius:13px;background:#0c1626;border:1px solid var(--line);font-weight:700;font-size:14px;color:var(--mut);display:flex;flex-direction:column;align-items:center;gap:5px}
  .seg button .em{font-size:22px}.seg button.on{border-color:var(--blue);color:var(--txt);background:#10213c;box-shadow:0 0 0 3px #2563eb33}
  .line{display:flex;gap:8px;align-items:center;background:#0c1626;border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin-top:8px}
  .line .nm{flex:1;font-size:13px;min-width:0}.line .nm b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.line .nm span{color:var(--mut);font-size:11px}
  .qty{display:flex;align-items:center;background:#0a1320;border:1px solid var(--line);border-radius:9px}
  .qty button{width:30px;height:32px;font-size:17px;font-weight:800;color:var(--cyan)}.qty input{width:34px;text-align:center;background:transparent;border:none;color:var(--txt);font-weight:800;font-size:14px}
  .line .lt{font-weight:800;font-size:13px;width:74px;text-align:right}
  .totbar{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .totbar .t{font-size:13px;color:var(--mut)}.totbar .v{font-size:26px;font-weight:800;color:var(--emerald)}
  .addsku{display:flex;gap:8px;margin-top:10px}.addsku select{flex:1}.addsku button{background:var(--blue);color:#fff;font-weight:800;border-radius:11px;padding:0 16px;font-size:20px}
  .btn-go{width:100%;background:linear-gradient(135deg,var(--emerald),#059669);color:#fff;font-weight:800;padding:15px;border-radius:13px;margin-top:16px}
  .btn-go[disabled]{opacity:.45;filter:grayscale(.4)}

  .dash-controls{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin:14px 2px 18px}
  .pillset{display:flex;background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:3px}
  .pillset button{padding:8px 14px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--mut)}.pillset button.on{background:var(--blue);color:#fff}
  select.dsel{background:var(--surf);border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:11px;font-size:13px;font-weight:600}
  .live-ind{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--mut);font-weight:600}.live-ind .d{width:8px;height:8px;border-radius:50%;background:var(--emerald);animation:pulse 1.4s infinite}
  .switch{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:var(--mut);font-weight:600;cursor:pointer;user-select:none}
  .switch .track{width:38px;height:22px;border-radius:20px;background:#27344e;position:relative;transition:.2s}
  .switch .track::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s}
  .switch.on .track{background:var(--emerald)}.switch.on .track::after{left:19px}

  .dkpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
  .dkpi{background:linear-gradient(180deg,var(--surf),#101a2e);border:1px solid var(--line);border-radius:15px;padding:14px 13px;position:relative;overflow:hidden}
  .dkpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue)}
  .dkpi.c1::before{background:var(--cyan)}.dkpi.c2::before{background:var(--blue)}.dkpi.c3::before{background:var(--violet)}
  .dkpi.c4::before{background:var(--emerald)}.dkpi.c5::before{background:var(--amber)}.dkpi.c6::before{background:#f472b6}
  .dkpi .l{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .dkpi .v{font-size:22px;font-weight:800;margin-top:7px}.dkpi .v small{font-size:11px;color:var(--mut);font-weight:600}.dkpi .sub{font-size:10.5px;color:var(--mut2);margin-top:3px;font-weight:600}

  .panels{display:grid;grid-template-columns:1.3fr 1fr;gap:13px}
  .panel{background:linear-gradient(180deg,var(--surf),#0f1828);border:1px solid var(--line);border-radius:18px;padding:17px 18px}
  .panel h3{margin:0 0 4px;font-size:14px}.panel .ph{font-size:11.5px;color:var(--mut);margin-bottom:14px}
  .bar-row{display:flex;align-items:center;gap:11px;margin-bottom:11px}
  .bar-row .nm{width:120px;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none}
  .bar-track{flex:1;height:24px;background:#0c1626;border-radius:7px;overflow:hidden}
  .bar-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:flex-end;padding-right:9px;font-size:11px;font-weight:800;color:#02121f;min-width:46px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .bar-fill.g{background:linear-gradient(90deg,#059669,var(--emerald));color:#03190f}
  .donut-wrap{display:flex;align-items:center;gap:22px}
  .donut{width:130px;height:130px;border-radius:50%;flex:none;position:relative}
  .donut .hole{position:absolute;inset:26px;border-radius:50%;background:#101a2e;display:grid;place-items:center;text-align:center}
  .donut .hole b{font-size:22px;font-weight:800;display:block}.donut .hole span{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
  .leg{display:flex;flex-direction:column;gap:11px}.leg .li{display:flex;align-items:center;gap:9px;font-size:13px}.leg .sw{width:12px;height:12px;border-radius:4px;flex:none}.leg b{margin-left:4px}
  .hours{display:flex;align-items:flex-end;gap:5px;height:120px;margin-top:6px}
  .hours .hbar{flex:1;background:linear-gradient(180deg,var(--blue),#1b3c87);border-radius:5px 5px 0 0;position:relative;min-height:3px;transition:height .5s}
  .hours .hbar span{position:absolute;bottom:-19px;left:0;right:0;text-align:center;font-size:9px;color:var(--mut2)}
  .tscroll{overflow-x:auto}
  table.dt{width:100%;border-collapse:collapse;font-size:12.5px;min-width:680px}
  table.dt th{text-align:left;color:var(--mut);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;padding:9px 10px;border-bottom:1px solid var(--line)}
  table.dt td{padding:11px 10px;border-bottom:1px solid #1a2538}table.dt tr:last-child td{border-bottom:none}
  table.dt td.num,table.dt th.num{text-align:right}
  .rk{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:7px;background:#1a2538;font-size:11px;font-weight:800;margin-right:8px}
  .rk.r1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#3a2400}.rk.r2{background:#334155;color:#cbd5e1}.rk.r3{background:#3b2f1e;color:#fcd34d}
  .full{grid-column:1/-1}.mono{font-variant-numeric:tabular-nums;color:var(--mut)}

  /* Alertas integridad */
  .alertbox{border-color:#3a2a3e;background:linear-gradient(180deg,#1d1626,#14101c)}
  .ab-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .ab-head h3{display:flex;align-items:center;gap:10px}
  .ab-count{font-size:11px;font-weight:800;color:#fff;background:var(--rose);border-radius:20px;padding:2px 10px}
  .mini{background:#221a2c;border:1px solid #3a2a3e;color:var(--mut);font-size:11.5px;font-weight:700;border-radius:9px;padding:7px 11px;margin-left:6px}
  .mini:hover{color:var(--txt)}
  .alert{display:flex;gap:12px;align-items:flex-start;background:#160f1d;border:1px solid #2e2238;border-left:3px solid var(--rose);border-radius:12px;padding:12px 13px;margin-bottom:9px}
  .alert.sev-med{border-left-color:var(--amber)}.alert.rd{opacity:.55}
  .al-ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none;background:#3a1620;color:var(--rose);font-size:15px;font-weight:800}
  .alert.sev-med .al-ic{background:#33270f;color:var(--amber)}
  .al-body{flex:1;min-width:0}.al-body b{font-size:13.5px}
  .al-tipo{font-size:13px;font-weight:700;color:var(--txt)}
  .al-det{font-size:12px;color:var(--mut);margin-top:3px;line-height:1.5}
  .al-meta{font-size:11px;color:var(--mut2);margin-top:6px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .al-origin{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;border-radius:20px;padding:2px 8px;background:#241a2e;color:#c4b5fd;border:1px solid #3a2a4e}
  .al-origin.real{background:#0c2118;color:var(--emerald);border-color:#1d4d39}
  .note{background:#0c1626;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:11.5px;color:var(--mut);line-height:1.6;margin-bottom:14px}
  .note b{color:var(--cyan)}

  @media(max-width:920px){.dkpis{grid-template-columns:repeat(3,1fr)}.panels{grid-template-columns:1fr}}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.dkpis{grid-template-columns:repeat(2,1fr)}.topbar .tt small{display:none}.bar-row .nm{width:92px}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  /* buscadores y selección */
  .reslist{margin-top:6px;max-height:230px;overflow:auto}
  .skures{background:#0c1626;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:7px;cursor:pointer}
  .skures:active{background:#16223c}
  .skures b{font-size:13.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .skures span{font-size:11px;color:var(--mut)}
  .skures.crear{color:var(--cyan);text-align:center;border-style:dashed}
  .skures.muted{color:var(--mut2);text-align:center;cursor:default}
  .chosen{margin-top:8px;background:#10213c;border:1px solid #2b4a7a;border-radius:11px;padding:11px 12px;font-size:14px;display:flex;align-items:center;gap:8px}
  .chosen .xbtn{margin-left:auto;background:transparent;border:1px solid var(--line);border-radius:8px;color:var(--mut);font-size:11px;padding:5px 9px;font-weight:700}

function gasGet(action,extra,cb){
  var qs='?action='+encodeURIComponent(action);
  if(extra){for(var k in extra){if(extra[k]!=null&&extra[k]!=='')qs+='&'+k+'='+encodeURIComponent(extra[k]);}}
  fetch(GAS_URL+qs).then(function(r){return r.json();}).then(function(j){cb(null,j);}).catch(function(e){cb(e,null);});
}
function gasPost(payload,cb){
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)})
    .then(function(r){return r.json();}).then(function(j){if(cb)cb(null,j);}).catch(function(e){if(cb)cb(e,null);});
}

    numero:String(r.Numero||''),horaInicio:String(r.HoraInicio||''),horaFin:String(r.HoraFin||''),
    durSec:Number(r.DuracionSeg||0),venta:String(r.Venta)==='SI',contacto:String(r.Contacto||''),

function cargarDesdeGAS(cb){
  LOADING=true;var pend=2,errAny=null;
  gasGet('listar_llamadas',{fecha_desde:diasAtras(30)},function(e,j){
    if(e||!j||!j.ok){errAny=e||'llamadas';}else{RECORDS=(j.data||[]).map(mapLlamada);}
    if(--pend===0){LOADING=false;if(cb)cb(errAny);}

    if(--pend===0){LOADING=false;if(cb)cb(errAny);}
  });
}

var _seed=20260617;
function rnd(){_seed=(_seed*1103515245+12345)&0x7fffffff;return _seed/0x7fffffff;}
function pick(a){return a[Math.floor(rnd()*a.length)];}
function ri(a,b){return Math.floor(rnd()*(b-a+1))+a;}
function pad(n){return n<10?'0'+n:''+n;}
function ymd(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function todayStr(){return ymd(new Date());}
function fmtS(n){return 'S/ '+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtInt(n){return(''+n).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function clockNow(){var d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());}
function secToFull(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return pad(h)+':'+pad(m)+':'+pad(x);}
function secToShort(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return h>0?(h+':'+pad(m)+':'+pad(x)):(pad(m)+':'+pad(x));}
function telFmt(n){return n.replace(/(\d{3})(?=\d)/g,'$1 ').trim();}
function genMobile(){return '9'+ri(10,99)+' '+ri(100,999)+' '+ri(100,999);}
function addSecToTime(hhmmss,sec){var p=hhmmss.split(':');var t=(+p[0])*3600+(+p[1])*60+(+p[2])+sec;t%=86400;return secToFull(t);}

/* ===== CONTROL DE INTEGRIDAD (real, lado app) ===== */
function monStart(){
  if(!window.performance||!performance.now)return;
  MON.lastW=Date.now();MON.lastP=performance.now();MON.running=true;
  MON.int=setInterval(monCheck,4000);
}
function monStop(){MON.running=false;if(MON.int){clearInterval(MON.int);MON.int=null;}}
function monCheck(){
  if(document.visibilityState!=='visible')return;
  var w=Date.now(),p=performance.now();
  var dW=w-MON.lastW,dP=p-MON.lastP;
  var jump=dW-dP; /* ~0 normal; positivo=hora adelantada; negativo=hora atrasada */
  if(Date.now()<MON.cooldownUntil){MON.lastW=w;MON.lastP=p;return;}
  if(jump>15000||jump<-3000){
    var dir=jump<0?'atrasó':'adelantó';
    raiseAlert(SESSION.id,'Cambio de hora del equipo',
      'El reloj del dispositivo se '+dir+' aprox. '+Math.abs(Math.round(jump/1000))+' s mientras la app estaba activa. Esto altera los tiempos de llamada.','high','real');
    MON.cooldownUntil=Date.now()+20000;
  }
  MON.lastW=w;MON.lastP=p;
}
document.addEventListener('visibilitychange',function(){
  if(!MON.running)return;
  if(document.visibilityState==='visible'){
    var w=Date.now(),p=performance.now();var jump=(w-MON.lastW)-(p-MON.lastP);
    if(jump<-3000&&Date.now()>=MON.cooldownUntil){
      raiseAlert(SESSION.id,'Cambio de hora del equipo','El reloj del dispositivo se atrasó aprox. '+Math.abs(Math.round(jump/1000))+' s.','high','real');
      MON.cooldownUntil=Date.now()+20000;
    }
    MON.lastW=w;MON.lastP=p;
  }
});

function raiseAlert(transId,tipo,detalle,sev,origin){

  var a={id:Date.now()+'-'+Math.floor(Math.random()*9999),transId:transId,transName:uname(transId),
    tipo:tipo,detalle:detalle,sev:sev||'high',origin:origin||'real',fecha:ymd(d),
    hora:pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()),read:false};
  if(ONLINE){
    gasPost({action:'guardar_alerta',transferencista:a.transName,tipo:a.tipo,detalle:a.detalle,
      severidad:a.sev,origen:a.origin,fecha:a.fecha,hora:a.hora},function(){});
  }
  ALERTS.unshift(a);
  notifySystem(a);
  if(SESSION&&SESSION.role==='admin'&&DASH.view==='panel')renderDash();
  updateBell();
}
/* La notificación del sistema SOLO se dispara para el administrador */
function notifySystem(a){
  if(!SESSION||SESSION.role!=='admin')return;
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  try{
    var title='⚠ Integridad · '+a.transName;
    var body=a.tipo+' — '+a.fecha+' '+a.hora;
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({type:'integrity-alert',title:title,body:body});
    }else{new Notification(title,{body:body,icon:'./icon-192.png'});}
  }catch(e){}
}
function reqPerm(){if(typeof Notification==='undefined'){alert('Este navegador no soporta notificaciones.');return;}
  Notification.requestPermission(function(p){if(p==='granted')alert('Notificaciones activadas para el administrador.');});}
function adminEntryNotify(){
  var unread=0;for(var i=0;i<ALERTS.length;i++)if(!ALERTS[i].read)unread++;
  if(unread>0&&typeof Notification!=='undefined'&&Notification.permission==='granted'){
    try{navigator.serviceWorker&&navigator.serviceWorker.controller
      ?navigator.serviceWorker.controller.postMessage({type:'integrity-alert',title:'🔔 '+unread+' alertas de integridad',body:'Tienes '+unread+' eventos por revisar en el panel.'})
      :new Notification('🔔 '+unread+' alertas de integridad',{body:'Tienes '+unread+' eventos por revisar.',icon:'./icon-192.png'});}catch(e){}
  }
}
function updateBell(){

function markAll(){

/* ===== APP TRANSFERENCISTA ===== */
function myToday(){var t=todayStr(),r=[];for(var i=0;i<RECORDS.length;i++)if(RECORDS[i].trans===SESSION.id&&RECORDS[i].fecha===t)r.push(RECORDS[i]);
  for(var p=0;p<PENDING.length;p++)if(PENDING[p].trans===SESSION.id&&PENDING[p].fecha===t)r.push(PENDING[p]);
  r.sort(function(a,b){return a.horaInicio<b.horaInicio?1:-1;});return r;}
function syncedToday(){var t=todayStr(),r=[];for(var i=0;i<RECORDS.length;i++)if(RECORDS[i].trans===SESSION.id&&RECORDS[i].fecha===t)r.push(RECORDS[i]);return r;}
function renderApp(){
  var syn=syncedToday();var pend=PENDING.slice();

    '<div class="greet"><h1>Hola, '+SESSION.name+'</h1><p>'+new Date().toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long'})+'</p>'+
      '<span class="chip-ok"><span class="pulse"></span>Control de integridad activo</span></div>'+
    '<div class="kpis">'+
      '<div class="kpi accent"><div class="lab">Tiempo en llamadas</div><div class="val num">'+secToFull(seg)+'</div></div>'+
      '<div class="kpi"><div class="lab">Llamadas hoy</div><div class="val num">'+all.length+'</div></div>'+
      '<div class="kpi"><div class="lab">Ventas</div><div class="val num">'+ven+'</div></div>'+
      '<div class="kpi green"><div class="lab">Soles</div><div class="val num">'+ventas.toFixed(0)+'<small> S/</small></div></div>'+
    '</div>'+
    syncBtn+
    '<div class="hero"><div class="hh">Inicia la llamada aquí. El número, la hora y la duración se registran automáticamente.</div>'+
      '<button class="start-btn" onclick="openFlow()">&#9742; Iniciar llamada</button></div>'+
    '<div class="appbtns">'+
      '<button class="appbtn" onclick="renderMiGestion()"><span class="em">&#128197;</span>Mi gestión</button>'+
      '<button class="appbtn" onclick="renderCierre()"><span class="em">&#128228;</span>Compartir cierre del día</button>'+

    '<button class="testlink" onclick="testIntegrity()">Probar alerta de integridad (demo)</button>'+
  '</div>';
  document.getElementById('view').innerHTML=html;
}
function testIntegrity(){

function callCard(r){

/* ===== CLIENTES (se guardan en el equipo del transferencista) ===== */
var CLIENTS_DB=[];
function clientsKey(){return 'transfer_cli_'+(SESSION?SESSION.id:'anon');}
function loadClients(){CLIENTS_DB=[];try{var r=localStorage.getItem(clientsKey());if(r)CLIENTS_DB=JSON.parse(r)||[];}catch(e){CLIENTS_DB=[];}}
function saveClients(){try{localStorage.setItem(clientsKey(),JSON.stringify(CLIENTS_DB));}catch(e){}}
function addClient(nombre,cadena,numero){var c={id:'c'+Date.now(),nombre:(nombre||'').toUpperCase().trim(),cadena:(cadena||'').toUpperCase().trim(),numero:(numero||'').replace(/[^\d+]/g,'')};CLIENTS_DB.unshift(c);saveClients();return c;}
function findClients(q){q=(q||'').toUpperCase().trim();var o=[];for(var i=0;i<CLIENTS_DB.length;i++){var c=CLIENTS_DB[i];if(!q||c.nombre.indexOf(q)>=0||(c.cadena&&c.cadena.indexOf(q)>=0))o.push(c);}return o;}

/* ===== FLUJO LLAMADA ===== */
function openFlow(){loadClients();FLOW={step:1,cliente:'',cadena:'',numero:'',creating:false,newName:'',startTs:0,horaInicio:'',horaFin:'',durSec:0,venta:null,contacto:'',lineas:[],causal:'',awaiting:false};renderFlow();}
function closeFlow(){if(TIMER){clearInterval(TIMER);TIMER=null;}FLOW=null;var s=document.getElementById('sheet');if(s)s.remove();}
function renderFlow(){
  var s=document.getElementById('sheet');
  if(!s){s=document.createElement('div');s.className='sheet';s.id='sheet';s.innerHTML='<div class="sheet-inner"></div>';document.body.appendChild(s);}
  s.querySelector('.sheet-inner').innerHTML=(FLOW.step===1?step1():FLOW.step===2?step2():step3());
}

function step1(){
  if(FLOW.creating)return step1Crear();
  return '<div class="step">Paso 1 de 3 · Cliente y llamada</div><h3>Nueva llamada</h3>'+
    '<label class="fl">Cliente</label>'+
    '<input class="fld" id="cliBuscar" autocomplete="off" placeholder="Escribe para buscar o crear" style="text-transform:uppercase" oninput="cliFilter(this.value)">'+
    '<div id="cliResults" class="reslist"></div>'+
    (FLOW.cliente?'<div class="chosen"><b>'+FLOW.cliente+'</b>'+(FLOW.cadena?' · '+FLOW.cadena:'')+'<button class="xbtn" onclick="cliClear()">cambiar</button></div>':'')+
    '<label class="fl" style="margin-top:12px">Número a marcar</label>'+
    '<input class="fld num" id="telInput" type="tel" inputmode="tel" placeholder="Número del cliente" value="'+(FLOW.numero||'')+'" oninput="FLOW.numero=this.value">'+
    '<a class="btn-call" id="callBtn" href="#" onclick="startCall(event)">&#9742; Llamar e iniciar registro</a>'+
    '<div class="meta-line"><span>La llamada se inicia desde la app</span><span>número · inicio · fin · duración</span></div>';
}
function step1Crear(){
  return '<div class="step">Nuevo cliente</div><h3>Crear cliente</h3>'+
    '<label class="fl">Nombre del cliente</label><input class="fld" id="ncNombre" style="text-transform:uppercase" value="'+(FLOW.newName||'')+'">'+
    '<label class="fl">Nombre de la cadena</label><input class="fld" id="ncCadena" style="text-transform:uppercase" placeholder="Cadena / mini cadena">'+
    '<label class="fl">Número de teléfono</label><input class="fld num" id="ncNumero" type="tel" inputmode="tel" placeholder="Número">'+
    '<div class="row-actions"><button class="btn-ghost" onclick="cliCancel()">Cancelar</button><button class="btn-go" style="margin-top:0" onclick="cliGuardar()">Guardar cliente</button></div>';
}
function cliFilter(q){var box=document.getElementById('cliResults');if(!box)return;var qu=(q||'').toUpperCase().trim();var res=findClients(qu);var out='';
  for(var i=0;i<res.length&&i<8;i++){var c=res[i];out+='<div class="skures" onclick="cliPick(\''+c.id+'\')"><b>'+c.nombre+'</b><span>'+(c.cadena||'')+(c.numero?' · '+telFmt(c.numero):'')+'</span></div>';}
  if(qu)out+='<div class="skures crear" onclick="cliNuevo()">&#43; Crear cliente "'+qu+'"</div>';
  box.innerHTML=out;}
function cliPick(id){var c=null;for(var i=0;i<CLIENTS_DB.length;i++)if(CLIENTS_DB[i].id===id)c=CLIENTS_DB[i];if(!c)return;
  FLOW.cliente=c.nombre;FLOW.cadena=c.cadena;FLOW.numero=c.numero;renderFlow();}
function cliNuevo(){var q=document.getElementById('cliBuscar');FLOW.newName=q?(''+q.value).toUpperCase().trim():'';FLOW.creating=true;renderFlow();}
function cliCancel(){FLOW.creating=false;renderFlow();}
function cliGuardar(){var nombre=valU('ncNombre'),cadena=valU('ncCadena'),numero=valU('ncNumero');
  if(!nombre){alert('Ingresa el nombre del cliente.');return;}
  var c=addClient(nombre,cadena,numero);FLOW.creating=false;FLOW.cliente=c.nombre;FLOW.cadena=c.cadena;FLOW.numero=c.numero;renderFlow();}
function cliClear(){FLOW.cliente='';FLOW.cadena='';FLOW.numero='';renderFlow();}
function valU(id){var e=document.getElementById(id);return e?(''+e.value).toUpperCase().trim():'';}
function startCall(ev){if(ev)ev.preventDefault();
  var t=document.getElementById('telInput');var num=t?(''+t.value).replace(/[^\d+]/g,''):'';
  if(!FLOW.cliente){alert('Selecciona o crea un cliente.');return;}
  if(num.length<6){alert('Ingresa un número válido.');return;}
  FLOW.numero=num;FLOW.startTs=Date.now();FLOW.horaInicio=clockNow();FLOW.step=2;FLOW.awaiting=true;
  try{window.location.href='tel:'+num;}catch(e){}
  setTimeout(function(){renderFlow();TIMER=setInterval(tickTimer,250);tickTimer();},30);}
/* Cuando el agente vuelve a la app después de la llamada, el tiempo se detiene solo */
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState!=='visible')return;
  if(FLOW&&FLOW.step===2&&FLOW.awaiting){finalizeCall();}
});
window.addEventListener('focus',function(){if(FLOW&&FLOW.step===2&&FLOW.awaiting){finalizeCall();}});
function finalizeCall(){
  if(!FLOW||FLOW.step!==2)return;FLOW.awaiting=false;
  if(TIMER){clearInterval(TIMER);TIMER=null;}
  FLOW.durSec=Math.max(1,Math.round((Date.now()-FLOW.startTs)/1000));
  FLOW.horaFin=addSecToTime(FLOW.horaInicio,FLOW.durSec);FLOW.step=3;renderFlow();
}
function step2(){var R=92,C=2*Math.PI*R;
  return '<div class="step">Paso 2 · Llamada en curso</div><h3>'+FLOW.cliente+'</h3>'+
    '<div style="text-align:center;color:var(--mut);font-size:13px">'+telFmt(FLOW.numero)+'</div>'+
    '<div style="text-align:center"><span class="live-pill"><span class="pulse"></span>Registrando tiempo</span></div>'+
    '<div class="ring-wrap"><div class="ring"><svg width="200" height="200" viewBox="0 0 200 200">'+
      '<circle cx="100" cy="100" r="'+R+'" fill="none" stroke="#1b2740" stroke-width="13"/>'+
      '<circle id="prog" cx="100" cy="100" r="'+R+'" fill="none" stroke="url(#g)" stroke-width="13" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"/>'+
      '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10B981"/><stop offset="1" stop-color="#22D3EE"/></linearGradient></defs>'+
      '</svg><div class="center"><div class="time num" id="clock">00:00</div><div class="cli">inicio '+FLOW.horaInicio+'</div></div></div></div>'+
    '<button class="btn-stop" onclick="stopCall()">&#9632; Terminé la llamada</button>'+
    '<div class="meta-line" style="border-top:none;justify-content:center;color:var(--mut2)"><span>El tiempo se detiene solo al volver de la llamada</span></div>';
}
function tickTimer(){var el=(Date.now()-FLOW.startTs)/1000;var c=document.getElementById('clock');if(c)c.textContent=secToShort(Math.floor(el));
  var p=document.getElementById('prog');if(p){var R=92,C=2*Math.PI*R;var frac=Math.min(el/(10*60),1);p.setAttribute('stroke-dashoffset',C*(1-frac));}}
function stopCall(){if(FLOW)FLOW.awaiting=false;if(TIMER){clearInterval(TIMER);TIMER=null;}
  FLOW.durSec=Math.max(1,Math.round((Date.now()-FLOW.startTs)/1000));FLOW.horaFin=addSecToTime(FLOW.horaInicio,FLOW.durSec);FLOW.step=3;renderFlow();}
function step3(){
  var ped='';
  if(FLOW.venta===true){
    var tot=0;var lines='';
    for(var j=0;j<FLOW.lineas.length;j++){var L=FLOW.lineas[j];tot+=L.subtotal;
      lines+='<div class="skuline"><div class="top"><div class="nm"><b>'+L.nm+'</b><span>'+(L.marca||'')+(L.ean?' · '+L.ean:'')+'</span></div>'+
        '<button class="rm" onclick="removeLine('+j+')">&#10005;</button></div>'+
        '<div class="ins"><div class="grp"><label>Unidades</label><input type="number" inputmode="numeric" min="0" value="'+L.cantidad+'" oninput="lineEdit('+j+',\'cantidad\',this.value)"></div>'+
        '<div class="grp"><label>Costo unit. (S/)</label><input type="number" inputmode="decimal" min="0" step="0.01" value="'+(L.precio||'')+'" oninput="lineEdit('+j+',\'precio\',this.value)"></div>'+
        '<div class="lt" id="lt_'+j+'">'+fmtS(L.subtotal)+'</div></div></div>';}
    ped='<div class="sec-title" style="margin:18px 4px 6px"><h2>Productos del pedido</h2><span class="badge"><span id="ordN">'+FLOW.lineas.length+'</span>/20 · S/ <span id="ordTot">'+tot.toFixed(2)+'</span></span></div>'+
      '<input class="fld" id="skuSearch" autocomplete="off" placeholder="Busca SKU por nombre, marca o EAN" oninput="skuFilter(this.value)">'+
      '<div id="skuResults" class="reslist"></div>'+
      lines+
      '<button class="btn-go" '+(FLOW.lineas.length?'':'disabled')+' onclick="saveCall()">Guardar llamada ✓</button>';
  }else if(FLOW.venta===false){
    var co='<option value="">Selecciona el motivo…</option>';
    for(var k=0;k<CAUSALES.length;k++)co+='<option'+(FLOW.causal===CAUSALES[k]?' selected':'')+'>'+CAUSALES[k]+'</option>';
    ped='<label class="fl">¿Por qué no se concretó la venta?</label><select class="fld" id="selCausal" onchange="FLOW.causal=this.value">'+co+'</select>'+
      '<button class="btn-go" style="background:linear-gradient(135deg,var(--amber),#d97706)" onclick="saveCall()">Guardar llamada ✓</button>';
  }
  return '<div class="step">Paso 3 · Resultado</div><h3>'+FLOW.cliente+'</h3>'+
    '<div class="meta-line" style="border-top:none;margin-top:4px;padding-top:0"><span>'+telFmt(FLOW.numero)+'</span><span>inicio '+FLOW.horaInicio+'</span></div>'+
    '<label class="fl">Duración real de la llamada</label>'+
    '<div class="durrow"><input type="number" min="0" id="durMin" value="'+Math.floor(FLOW.durSec/60)+'" oninput="durEdit()"><span class="dsep">min</span>'+
      '<input type="number" min="0" max="59" id="durSeg" value="'+(FLOW.durSec%60)+'" oninput="durEdit()"><span class="dsep">seg</span>'+
      '<span class="durtot" id="durTot">'+secToShort(FLOW.durSec)+'</span></div>'+
    '<label class="fl">¿Con quién habló? (encargado)</label>'+
    '<input class="fld" id="contacto" placeholder="Nombre del responsable" style="text-transform:uppercase" value="'+(FLOW.contacto||'')+'" oninput="FLOW.contacto=this.value">'+
    '<label class="fl" style="margin-top:14px">Resultado</label>'+
    '<div class="seg"><button class="'+(FLOW.venta===true?'on':'')+'" onclick="setVenta(true)"><span class="em">&#128722;</span>Logró venta</button>'+
      '<button class="'+(FLOW.venta===false?'on':'')+'" onclick="setVenta(false)"><span class="em">&#10005;</span>Sin venta</button></div>'+ped;
}
function durEdit(){var m=parseInt((document.getElementById('durMin')||{}).value,10)||0;var s=parseInt((document.getElementById('durSeg')||{}).value,10)||0;
  if(s>59)s=59;if(m<0)m=0;if(s<0)s=0;FLOW.durSec=Math.max(1,m*60+s);FLOW.horaFin=addSecToTime(FLOW.horaInicio,FLOW.durSec);
  var t=document.getElementById('durTot');if(t)t.textContent=secToShort(FLOW.durSec);}
function setVenta(v){var c=document.getElementById('contacto');if(c)FLOW.contacto=c.value;
  FLOW.venta=v;if(v)FLOW.causal='';else FLOW.lineas=[];renderFlow();}
function skuFilter(q){var box=document.getElementById('skuResults');if(!box)return;var qu=(q||'').toUpperCase().trim();
  if(!qu){box.innerHTML='';return;}var out='',cnt=0;
  for(var i=0;i<SKUS.length&&cnt<30;i++){var s=SKUS[i];
    if(s.nm.toUpperCase().indexOf(qu)>=0||s.ean.indexOf(qu)>=0||s.marca.toUpperCase().indexOf(qu)>=0){
      out+='<div class="skures" onclick="addSkuToOrder('+i+')"><b>'+s.nm+'</b><span>'+s.marca+' · '+s.ean+'</span></div>';cnt++;}}
  box.innerHTML=out||'<div class="skures muted">Sin resultados</div>';}
function addSkuToOrder(i){var c=document.getElementById('contacto');if(c)FLOW.contacto=c.value;
  if(FLOW.lineas.length>=20){alert('Máximo 20 SKUs por pedido.');return;}
  var s=SKUS[i];for(var k=0;k<FLOW.lineas.length;k++)if(FLOW.lineas[k].ean===s.ean)return;
  FLOW.lineas.push({ean:s.ean,nm:s.nm,marca:s.marca,cat:s.cat,sub:s.sub,cantidad:1,precio:0,subtotal:0});renderFlow();}
function removeLine(j){var c=document.getElementById('contacto');if(c)FLOW.contacto=c.value;FLOW.lineas.splice(j,1);renderFlow();}
function lineEdit(j,field,val){var L=FLOW.lineas[j];var n=parseFloat(val);if(isNaN(n)||n<0)n=0;
  if(field==='cantidad')L.cantidad=Math.floor(n);else L.precio=n;
  L.subtotal=+(L.cantidad*L.precio).toFixed(2);
  var lt=document.getElementById('lt_'+j);if(lt)lt.textContent=fmtS(L.subtotal);
  var t=0;for(var i=0;i<FLOW.lineas.length;i++)t+=FLOW.lineas[i].subtotal;
  var ot=document.getElementById('ordTot');if(ot)ot.textContent=t.toFixed(2);
  var on=document.getElementById('ordN');if(on)on.textContent=FLOW.lineas.length;}

/* ===== MI GESTIÓN (historial / acumulado entre fechas) ===== */
var MG={desde:'',hasta:''};
function renderMiGestion(){
  if(!MG.desde){MG.desde=diasAtras(7);MG.hasta=todayStr();}
  var recs=myRange(MG.desde,MG.hasta);
  var seg=0,ventas=0,ven=0;for(var i=0;i<recs.length;i++){seg+=recs[i].durSec;if(recs[i].venta){ven++;ventas+=recs[i].total;}}
  var conv=recs.length?Math.round(ven/recs.length*100):0;
  var html='<div class="wrap">'+
    '<div class="greet" style="display:flex;align-items:center;gap:10px"><button class="logout" onclick="renderApp()">‹ Volver</button><h1 style="font-size:18px;margin:0">Mi gestión</h1></div>'+
    '<div class="daterow"><div class="grp"><label class="fl">Desde</label><input class="fld" type="date" value="'+MG.desde+'" onchange="MG.desde=this.value;renderMiGestion()"></div>'+
      '<div class="grp"><label class="fl">Hasta</label><input class="fld" type="date" value="'+MG.hasta+'" onchange="MG.hasta=this.value;renderMiGestion()"></div></div>'+
    '<div class="kpis" style="margin-top:12px">'+
      '<div class="kpi accent"><div class="lab">Tiempo</div><div class="val num">'+secToFull(seg)+'</div></div>'+
      '<div class="kpi"><div class="lab">Llamadas</div><div class="val num">'+recs.length+'</div></div>'+
      '<div class="kpi"><div class="lab">Conversión</div><div class="val num">'+conv+'<small> %</small></div></div>'+
      '<div class="kpi green"><div class="lab">Soles</div><div class="val num">'+ventas.toFixed(0)+'<small> S/</small></div></div>'+
    '</div>'+
    '<div class="sec-title"><h2>Detalle</h2><span class="badge">'+recs.length+'</span></div>'+
    (recs.length?recs.map(callCardFull).join(''):'<div class="empty">Sin llamadas en el rango seleccionado.</div>')+
  '</div>';
  document.getElementById('view').innerHTML=html;
}
function myRange(desde,hasta){var o=[],seen={};
  for(var i=0;i<RECORDS.length;i++){var r=RECORDS[i];if(r.trans!==SESSION.id)continue;
    if(desde&&r.fecha<desde)continue;if(hasta&&r.fecha>hasta)continue;o.push(r);seen[r.id]=1;}
  for(var p=0;p<PENDING.length;p++){var q=PENDING[p];if(q.trans!==SESSION.id||seen[q.id])continue;
    if(desde&&q.fecha<desde)continue;if(hasta&&q.fecha>hasta)continue;o.push(q);}
  o.sort(function(a,b){return (a.fecha+a.horaInicio)<(b.fecha+b.horaInicio)?1:-1;});return o;}
function callCardFull(r){var tag=r.venta?'<span class="tag sale">'+fmtS(r.total)+'</span>':'<span class="tag nosale">'+r.causal+'</span>';
  return '<div class="call"><div class="ic">&#9742;</div><div class="who"><b>'+r.cliente+'</b><span>'+r.fecha+' · '+telFmt(r.numero)+'</span>'+
    '<div class="meta">'+r.horaInicio+' → '+r.horaFin+'</div>'+tag+'</div><div class="rt"><div class="dur num">'+secToShort(r.durSec)+'</div></div></div>';}

/* ===== COMPARTIR CIERRE DEL DÍA ===== */
var CIERRE_TXT='';
function renderCierre(){
  var recs=myToday();var seg=0,ventas=0,ven=0,nov=0;var agg={};
  for(var i=0;i<recs.length;i++){var r=recs[i];seg+=r.durSec;
    if(r.venta){ven++;ventas+=r.total;for(var l=0;l<r.lineas.length;l++){var L=r.lineas[l];var k=L.ean||L.nm;
      if(!agg[k])agg[k]={nm:L.nm,und:0,soles:0};agg[k].und+=Number(L.cantidad||0);agg[k].soles+=Number(L.subtotal||0);}}else nov++;}
  var mins=Math.round(seg/60);var efe=recs.length?Math.round(ven/recs.length*100):0;
  var fecha=new Date().toLocaleDateString('es-PE');
  var txt='CIERRE DEL DÍA — '+fecha+'\n';
  txt+='USUARIO: '+SESSION.name+'\n';
  txt+='Total llamadas: '+recs.length+'\n';
  txt+='Total minutos: '+mins+'\n';
  txt+='Con venta: '+ven+'\n';
  txt+='Sin venta: '+nov+'\n';
  txt+='Efectividad: '+efe+'%\n';
  txt+='Total S/: '+ventas.toFixed(2)+'\n';
  var lista='';for(var kk in agg){lista+='• '+agg[kk].nm+' ('+agg[kk].und+' UND) = '+fmtS(agg[kk].soles)+'\n';}
  if(lista)txt+='\nSKUs vendidos:\n'+lista;
  CIERRE_TXT=txt;
  var s=document.getElementById('sheet');if(s)s.remove();
  var div=document.createElement('div');div.className='sheet';div.id='sheet';
  div.innerHTML='<div class="sheet-inner"><div class="step">Cierre del día</div><h3>Compartir cierre</h3>'+
    '<div class="report">'+txt.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div>'+
    '<div class="row-actions"><button class="btn-ghost" onclick="closeSheet()">Cerrar</button><button class="btn-go" style="margin-top:0" onclick="compartirCierre()">Compartir</button></div>'+
    '<button class="testlink" onclick="copiarCierre()" style="margin-top:14px">Copiar texto</button></div>';
  document.body.appendChild(div);
}
function closeSheet(){var s=document.getElementById('sheet');if(s)s.remove();}
function compartirCierre(){if(navigator.share){navigator.share({title:'Cierre del día',text:CIERRE_TXT}).catch(function(){});}else{copiarCierre();}}
function copiarCierre(){try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(CIERRE_TXT).then(function(){alert('Cierre copiado. Pégalo en WhatsApp.');},function(){alert(CIERRE_TXT);});}else{alert(CIERRE_TXT);}}catch(e){alert(CIERRE_TXT);}}

function saveCall(){
  if(!FLOW.contacto||!FLOW.contacto.trim()){alert('Indica con quién habló.');return;}
  if(FLOW.venta===null){alert('Marca si hubo venta o no.');return;}
  if(FLOW.venta===false&&!FLOW.causal){alert('Selecciona el motivo de no venta.');return;}
  var total=0;for(var i=0;i<FLOW.lineas.length;i++)total+=FLOW.lineas[i].subtotal;
  var rec={id:Date.now()+'-'+SESSION.id,fecha:todayStr(),trans:SESSION.id,cliente:FLOW.cliente+(FLOW.cadena?' · '+FLOW.cadena:''),numero:FLOW.numero,
    horaInicio:FLOW.horaInicio,horaFin:FLOW.horaFin,durSec:FLOW.durSec,venta:!!FLOW.venta,contacto:FLOW.contacto.trim(),
    lineas:FLOW.lineas.slice(),total:+total.toFixed(2),causal:FLOW.venta?'':FLOW.causal};
  PENDING.push(rec);savePending();
  closeFlow();renderApp();
  toast('Relevo guardado. Recuerda sincronizar para enviarlo a la base.');
}
/* ===== SINCRONIZAR RELEVOS ===== */
function syncRelevos(){
  if(SYNCING)return;
  if(!PENDING.length){toast('No hay relevos pendientes por sincronizar.');return;}
  if(!ONLINE){alert('La conexión a la base no está configurada (GAS_URL). No se puede sincronizar.');return;}
  SYNCING=true;renderApp();
  var queue=PENDING.slice();var i=0;var okIds=[];var failed=0;
  function next(){
    if(i>=queue.length){finishSync(queue,okIds,failed);return;}
    var rec=queue[i];
    gasPost({action:'guardar_llamada',id:rec.id,fecha:rec.fecha,horaInicio:rec.horaInicio,horaFin:rec.horaFin,
      duracionSeg:rec.durSec,transferencista:rec.trans,cliente:rec.cliente,numero:rec.numero,venta:rec.venta,
      contacto:rec.contacto,productos:rec.lineas,totalSoles:rec.total,causal:rec.causal,deviceTime:Date.now()},
      function(err,j){if(!err&&j&&j.ok){okIds.push(rec.id);}else{failed++;}i++;next();});
  }
  next();
}
function mergeRecords(arr){var have={};for(var i=0;i<RECORDS.length;i++)have[RECORDS[i].id]=1;
  for(var j=0;j<arr.length;j++)if(!have[arr[j].id])RECORDS.push(arr[j]);}
function finishSync(queue,okIds,failed){
  var synced=[];for(var s=0;s<queue.length;s++)if(okIds.indexOf(queue[s].id)>=0)synced.push(queue[s]);
  var keep=[];for(var k=0;k<PENDING.length;k++){if(okIds.indexOf(PENDING[k].id)<0)keep.push(PENDING[k]);}
  PENDING=keep;savePending();SYNCING=false;
  mergeRecords(synced);
  cargarDesdeGAS(function(){mergeRecords(synced);renderApp();
    if(failed===0)toast(okIds.length+' relevo(s) sincronizado(s). Ya están en tu base y en "Mi gestión".');
    else alert('Se enviaron '+okIds.length+' relevo(s). '+failed+' no llegaron y quedan guardados en el equipo para reintentar la sincronización.');
  });
}

/* ===== DASHBOARD ===== */
function filtered(){var t=new Date(),from=new Date();from.setDate(t.getDate()-DASH.days);
  var fromStr=DASH.days===0?todayStr():ymd(from);var out=[];
  for(var i=0;i<RECORDS.length;i++){var r=RECORDS[i];if(r.fecha<fromStr)continue;
    if(DASH.days===0&&r.fecha!==todayStr())continue;if(DASH.trans!=='ALL'&&r.trans!==DASH.trans)continue;out.push(r);}return out;}
function uname(id){for(var i=0;i<USERS.length;i++)if(USERS[i].id===id)return USERS[i].name;return id;}
function shortName(id){var p=uname(id).split(' ');return p[0]+' '+(p[1]?p[1].charAt(0)+'.':'');}

  var nC=recs.length;var prom=nC?Math.round(seg/nC):0;var conv=nC?(ven/nC*100):0;
  var transOpts='<option value="ALL">Todos los transferencistas</option>';
  for(var ui=0;ui<USERS.length;ui++){if(USERS[ui].role!=='trans')continue;var id=USERS[ui].id;transOpts+='<option value="'+id+'"'+(DASH.trans===id?' selected':'')+'>'+uname(id)+'</option>';}
  var html='<div class="wrap dash-wrap">'+
    '<div class="greet" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'+
      '<div><h1>Panel ejecutivo</h1><p>Tiempo de llamadas, resultados y control de integridad · tiempo real</p></div>'+
      '<div class="live-ind"><span class="d"></span> Actualizado <span id="upAt">'+clockNow()+'</span></div></div>'+
    alertsPanel()+
    '<div class="dash-controls"><div class="pillset">'+dbtn(0,'Hoy')+dbtn(1,'Ayer')+dbtn(7,'7 días')+dbtn(30,'30 días')+'</div>'+
      '<select class="dsel" onchange="DASH.trans=this.value;renderDash()">'+transOpts+'</select>'+
      '<div class="spacer"></div><div class="switch '+(DASH.live?'on':'')+'" onclick="toggleLive()"><span class="track"></span> '+(ONLINE?'Auto-actualizar':'Demo en vivo')+'</div></div>'+
    '<div class="dkpis">'+
      dkpi('c1','Tiempo en llamadas',secToFull(seg),'',nC+' llamadas')+
      dkpi('c2','Llamadas',fmtInt(nC),'',ven+' con venta')+
      dkpi('c3','Duración prom.',secToShort(prom),'','por llamada')+
      dkpi('c4','Ventas',ventas.toFixed(0),'S/',fmtInt(ven)+' pedidos')+
      dkpi('c5','Conversión',conv.toFixed(0),'%','ventas / llamadas')+
      dkpi('c6','Alertas',fmtInt(ALERTS.length),'','integridad')+
    '</div>'+
    '<div class="panels">'+
      '<div class="panel"><h3>Tiempo en llamadas por transferencista</h3><div class="ph">Minutos al teléfono en el periodo</div>'+barsTime(recs)+'</div>'+
      '<div class="panel"><h3>Resultado de llamadas</h3><div class="ph">Venta vs. sin venta</div>'+donutRes(recs)+'</div></div>'+
    '<div class="panels" style="margin-top:13px">'+
      '<div class="panel"><h3>Llamadas por cliente</h3><div class="ph">Dónde se concentra la gestión</div>'+barsClient(recs)+'</div>'+
      '<div class="panel"><h3>Ventas por transferencista</h3><div class="ph">Soles generados</div>'+barsSales(recs)+'</div></div>'+
    '<div class="panel full" style="margin-top:13px"><h3>Distribución horaria</h3><div class="ph">Llamadas por hora del día</div>'+hoursChart(recs)+'</div>'+
    '<div class="panel full" style="margin-top:13px"><h3>Productividad del equipo</h3><div class="ph">Ordenado por tiempo en llamadas</div>'+rankTable(recs)+'</div>'+
    '<div class="panel full" style="margin-top:13px"><h3>Registro de llamadas</h3><div class="ph">Número, inicio, fin y duración automáticos</div>'+detailTable(recs)+'</div>'+
  '</div>';
  document.getElementById('view').innerHTML=html;updateBell();
}
function alertsPanel(){
  var unread=0;for(var i=0;i<ALERTS.length;i++)if(!ALERTS[i].read)unread++;
  var head='<div class="panel full alertbox"><div class="ab-head"><h3>🔔 Alertas de integridad'+(unread?' <span class="ab-count">'+unread+' nuevas</span>':'')+'</h3>'+
    '<div><button class="mini" onclick="reqPerm()">Activar notificaciones</button><button class="mini" onclick="markAll()">Marcar leídas</button></div></div>'+
    '<div class="ph">Visibles solo para el administrador · transferencista, evento, fecha y hora</div>'+
    '<div class="note"><b>Cómo leerlo:</b> "control real" = detectado por la app en este equipo (cambio de hora). "módulo nativo (ejemplo)" = requiere la app Android complementaria para detectar apps sospechosas, hora automática apagada, GPS falso o root.</div>';
  if(!ALERTS.length)return head+'<div class="empty">Sin alertas. El equipo opera con normalidad.</div></div>';
  var body='';for(var j=0;j<ALERTS.length&&j<12;j++)body+=alertCard(ALERTS[j]);
  return head+body+'</div>';
}
function alertCard(a){
  var oc=a.origin==='real'?'control real':(a.origin==='ejemplo'?'módulo nativo (ejemplo)':'simulación');
  var ocls=a.origin==='real'?' real':'';
  return '<div class="alert sev-'+a.sev+(a.read?' rd':'')+'"><div class="al-ic">'+(a.sev==='high'?'⚠':'•')+'</div>'+
    '<div class="al-body"><b>'+a.transName+'</b> · <span class="al-tipo">'+a.tipo+'</span>'+
    '<div class="al-det">'+a.detalle+'</div>'+
    '<div class="al-meta">'+a.fecha+' · '+a.hora+'<span class="al-origin'+ocls+'">'+oc+'</span></div></div></div>';
}
function distinctTrans(recs){var m={};for(var i=0;i<recs.length;i++)m[recs[i].trans]=1;var n=0;for(var k in m)n++;return n||1;}
function dbtn(d,l){return '<button class="'+(DASH.days===d?'on':'')+'" onclick="DASH.days='+d+';renderDash()">'+l+'</button>';}
function dkpi(c,l,v,u,sub){return '<div class="dkpi '+c+'"><div class="l">'+l+'</div><div class="v num">'+v+(u?'<small> '+u+'</small>':'')+'</div><div class="sub">'+sub+'</div></div>';}
function aggBy(recs,key,field){var m={};for(var i=0;i<recs.length;i++){var k=recs[i][key];if(!m[k])m[k]=0;m[k]+=field==='dur'?recs[i].durSec:(field==='total'?recs[i].total:1);}
  var a=[];for(var x in m)a.push({k:x,v:m[x]});a.sort(function(p,q){return q.v-p.v;});return a;}
function emptyP(){return '<div class="empty">Sin datos en este periodo.</div>';}
function barRow(name,v,max,label,green){var pct=max?Math.max(8,(v/max*100)):0;
  return '<div class="bar-row"><div class="nm">'+name+'</div><div class="bar-track"><div class="bar-fill'+(green?' g':'')+'" style="width:'+pct+'%">'+label+'</div></div></div>';}
function barsTime(recs){var a=aggBy(recs,'trans','dur');if(!a.length)return emptyP();var max=a[0].v,h='';for(var i=0;i<a.length;i++)h+=barRow(shortName(a[i].k),a[i].v,max,secToShort(a[i].v));return h;}
function barsClient(recs){var a=aggBy(recs,'cliente','n');if(!a.length)return emptyP();a=a.slice(0,8);var max=a[0].v,h='';for(var i=0;i<a.length;i++)h+=barRow(a[i].k,a[i].v,max,fmtInt(a[i].v));return h;}
function barsSales(recs){var a=aggBy(recs,'trans','total');if(!a.length)return emptyP();var max=a[0].v||1,h='';for(var i=0;i<a.length;i++)h+=barRow(shortName(a[i].k),a[i].v,max,fmtS(a[i].v),true);return h;}
function donutRes(recs){var ven=0,nov=0;for(var i=0;i<recs.length;i++){if(recs[i].venta)ven++;else nov++;}var tot=ven+nov;var deg=tot?(ven/tot*360):0;var pv=tot?Math.round(ven/tot*100):0;
  return '<div class="donut-wrap"><div class="donut" style="background:conic-gradient(var(--emerald) 0deg '+deg+'deg,#2c3a52 '+deg+'deg 360deg)">'+
    '<div class="hole"><b class="num">'+pv+'%</b><span>conversión</span></div></div>'+
    '<div class="leg"><div class="li"><span class="sw" style="background:var(--emerald)"></span>Con venta <b class="num">'+ven+'</b></div>'+
    '<div class="li"><span class="sw" style="background:#2c3a52"></span>Sin venta <b class="num">'+nov+'</b></div></div></div>';}
function hoursChart(recs){var b={};for(var h=8;h<=19;h++)b[h]=0;
  for(var i=0;i<recs.length;i++){var hh=parseInt(recs[i].horaInicio.split(':')[0],10);if(b[hh]!==undefined)b[hh]++;}
  var max=1;for(var k in b)if(b[k]>max)max=b[k];var out='<div class="hours">';
  for(var hr=8;hr<=19;hr++)out+='<div class="hbar" style="height:'+(b[hr]/max*100)+'%" title="'+b[hr]+'"><span>'+hr+'h</span></div>';return out+'</div><div style="height:14px"></div>';}
function rankTable(recs){var ag={};
  for(var i=0;i<recs.length;i++){var r=recs[i];if(!ag[r.trans])ag[r.trans]={seg:0,n:0,ven:0,ventas:0};var a=ag[r.trans];a.seg+=r.durSec;a.n++;if(r.venta){a.ven++;a.ventas+=r.total;}}
  var arr=[];for(var k in ag){var a=ag[k];arr.push({id:k,seg:a.seg,n:a.n,prom:a.n?Math.round(a.seg/a.n):0,conv:a.n?a.ven/a.n*100:0,ventas:a.ventas});}
  arr.sort(function(x,y){return y.seg-x.seg;});if(!arr.length)return emptyP();
  var h='<div class="tscroll"><table class="dt"><thead><tr><th>Transferencista</th><th class="num">Tiempo</th><th class="num">Llamadas</th><th class="num">Dur. prom.</th><th class="num">Conv.</th><th class="num">Ventas</th></tr></thead><tbody>';
  for(var i=0;i<arr.length;i++){var a=arr[i];var rc=i<3?'r'+(i+1):'';
    h+='<tr><td><span class="rk '+rc+'">'+(i+1)+'</span>'+uname(a.id)+'</td><td class="num mono">'+secToFull(a.seg)+'</td><td class="num">'+a.n+'</td><td class="num mono">'+secToShort(a.prom)+'</td><td class="num">'+a.conv.toFixed(0)+'%</td><td class="num">'+fmtS(a.ventas)+'</td></tr>';}
  return h+'</tbody></table></div>';}
function detailTable(recs){var r=recs.slice().sort(function(a,b){return(a.fecha+a.horaInicio)<(b.fecha+b.horaInicio)?1:-1;}).slice(0,14);if(!r.length)return emptyP();
  var h='<div class="tscroll"><table class="dt"><thead><tr><th>Inicio</th><th>Fin</th><th class="num">Duración</th><th>Transferencista</th><th>Cadena</th><th>Número</th><th>Contacto</th><th>Resultado</th></tr></thead><tbody>';
  for(var i=0;i<r.length;i++){var x=r[i];var res=x.venta?'<span class="tag sale">'+fmtS(x.total)+'</span>':'<span class="tag nosale">'+x.causal+'</span>';
    h+='<tr><td class="mono">'+x.horaInicio+'</td><td class="mono">'+x.horaFin+'</td><td class="num mono">'+secToShort(x.durSec)+'</td><td>'+shortName(x.trans)+'</td><td>'+x.cliente+'</td><td class="mono">'+telFmt(x.numero)+'</td><td>'+(x.contacto||'—')+'</td><td>'+res+'</td></tr>';}
  return h+'</tbody></table></div>';}

/* ===== TIEMPO REAL ===== */
function toggleLive(){DASH.live=!DASH.live;if(DASH.live)startLive();else stopLive();renderDash();}
function startLive(){stopLive();
  DASH.clock=setInterval(function(){var e=document.getElementById('upAt');if(e)e.textContent=clockNow();},1000);
  if(!DASH.live)return;
  if(ONLINE){
    DASH.int=setInterval(function(){
      if(LOADING)return;
      cargarDesdeGAS(function(){if(SESSION&&SESSION.role==='admin'&&DASH.view==='panel')renderDash();});
    },15000);
  }else{
    DASH.int=setInterval(function(){injectLive();if(SESSION&&SESSION.role==='admin')renderDash();},9000);
  }
}
function stopLive(){if(DASH.int){clearInterval(DASH.int);DASH.int=null;}if(DASH.clock){clearInterval(DASH.clock);DASH.clock=null;}}
function injectLive(){
  var tids=transIds();var tid=tids[ri(0,tids.length-1)];var dur=ri(40,520);var conecto=rnd()<0.85;var venta=conecto&&rnd()<0.5;var lineas=[],tot=0;
  if(venta){var ns=ri(1,3);for(var s=0;s<ns;s++){var sk=pick(SKUS);var q=ri(1,10);var pr=ri(2,25);var sub=+(pr*q).toFixed(2);tot+=sub;lineas.push({ean:sk.ean,nm:sk.nm,marca:sk.marca,precio:pr,cantidad:q,subtotal:sub});}}
  if(!conecto)dur=ri(8,28);var hi=clockNow();
  RECORDS.push({id:Date.now()+'-live'+ri(1,9999),fecha:todayStr(),trans:tid,cliente:pick(DEMO_CLIENTS),numero:genMobile(),
    horaInicio:hi,horaFin:addSecToTime(hi,dur),durSec:dur,venta:venta,contacto:conecto?pick(CONTACTOS):'—',
    lineas:lineas,total:+tot.toFixed(2),causal:venta?'':(conecto?pick(['Sin presupuesto','Ya cuenta con stock','Precio elevado','Pedir cita / reagendar']):pick(['No contesta','Buzón de voz']))});
  /* de tanto en tanto, simula un evento de integridad para mostrar la notificación al admin */
  if(rnd()<0.22){
    var ev=pick([
      {t:'App sospechosa detectada',d:'Se detectó una app de modificación de hora instalada en el equipo.',s:'high'},
      {t:'Ubicación simulada (GPS falso)',d:'El equipo reporta una ubicación generada por una app de GPS falso.',s:'high'},
      {t:'Hora automática desactivada',d:'La opción "Fecha y hora automática" del sistema está apagada.',s:'high'}
    ]);
    var t2=tids[ri(0,tids.length-1)];var d=new Date();
    ALERTS.unshift({id:Date.now()+'-sim'+ri(1,9999),transId:t2,transName:uname(t2),tipo:ev.t,detalle:ev.d,sev:ev.s,origin:'simulacion',
      fecha:ymd(d),hora:pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()),read:false});
    notifySystem(ALERTS[0]);
  }
}
